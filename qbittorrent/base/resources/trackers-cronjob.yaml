apiVersion: batch/v1
kind: CronJob
metadata:
  name: qbittorrent-trackers
spec:
  schedule: "30 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: trackers
              image: bash:5.3.9@sha256:38697a8e277c4b61f75193f003db16590eda7b096577dd1c2be53afa207954e7
              command:
                - bash
              args:
                - -c
              env:
                - name: QBITTORRENT_HOST
                  value: http://qbittorrent.qbittorrent.svc.cluster.local
                - name: QBITTORRENT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: qbittorrent
                      key: qbittorrent-username
                - name: QBITTORRENT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: qbittorrent
                      key: qbittorrent-password
          restartPolicy: Never
